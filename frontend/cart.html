<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Your Cart | UNISOLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/bottom-nav.css" />
    <link rel="stylesheet" href="css/touch.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/cart.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/checkout.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->
    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
      <div class="nav-container">
        <!-- BRAND -->
        <a href="index.html" class="brand">UNISOLE</a>

        <!-- HAMBURGER-->
        <div class="hamburger"><span></span><span></span><span></span></div>

        <!-- LINKS -->
        <nav class="nav-links">
          <a href="mens.html">Men</a>
          <a href="womens.html">Women</a>
          <a href="orders.html">Orders</a>
        </nav>

        <!-- ACTIONS -->
        <div class="nav-actions">
          <!-- CART ICON -->
          <a href="cart.html" class="cart-btn" aria-label="Cart">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-count" class="cart-count">0</span>
          </a>

          <!-- LOGIN BUTTON -->
          <a href="login.html" class="login-btn">Login</a>

          <!-- PROFILE AVATAR -->
          <a
            href="profile.html"
            class="profile-avatar"
            id="profile-btn"
            style="display: none"
            aria-label="Profile"
          >
            <i class="fa-solid fa-user"></i>
          </a>
        </div>
      </div>
    </header>

    <!-- ================= CART ================= -->
    <main class="cart-page">
      <h1 class="cart-title">Your Cart</h1>

      <div class="cart-layout">
        <div class="cart-items" id="cart-items"></div>

        <div class="cart-summary">
          <h2>Order Summary</h2>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>

          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>

          <!-- CONNECTED TO cart.js -->
          <button class="checkout-btn" onclick="goToCheckout()">
            Proceed to Checkout
          </button>
        </div>
      </div>

      <p id="empty-cart" style="display: none; text-align: center">
        Your cart is empty
      </p>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
      <div class="footer-brand">UNISOLE</div>
      <p class="footer-tagline">Designed for Motion</p>

      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="mens.html">Men</a>
        <a href="womens.html">Women</a>
        <a href="orders.html">Orders</a>
        <a href="cart.html">Cart</a>
      </div>

      <div class="footer-social">
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
      </div>

      <div class="footer-divider"></div>

      <p>© 2026 UNISOLE — Designed for Motion</p>
      <p>
        Contact us -
        <a href="mailto:unisole.store@gmail.com">unisole.store@gmail.com</a>
      </p>
    </footer>

    <!-- ================= BOTTOM NAVIGATION (Mobile) ================= -->
    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="index.html" class="bottom-nav-item" data-page="home">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a href="mens.html" class="bottom-nav-item" data-page="men">
          <i class="fas fa-person"></i>
          <span>Men</span>
        </a>
        <a href="womens.html" class="bottom-nav-item" data-page="women">
          <i class="fas fa-person-dress"></i>
          <span>Women</span>
        </a>
        <a
          href="cart.html"
          class="bottom-nav-item home-icon active"
          data-page="cart"
        >
          <i class="fas fa-bag-shopping"></i>
          <span>Cart</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" data-page="profile">
          <i class="fas fa-user"></i>
          <span>Profile</span>
        </a>
      </div>
    </nav>

    <!-- JS -->
    <script src="js/toast.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script src="js/cartActions.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/authNavbar.js"></script>
    <script src="js/headerAuth.js"></script>
    <script src="js/enhancements.js" defer></script>
    <script src="js/animations.js" defer></script>
  </body>
</html>
