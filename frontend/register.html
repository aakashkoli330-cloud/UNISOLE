<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register | UNISOLE</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/product.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link rel="stylesheet" href="css/profile.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="brand">UNISOLE</div>

    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="subtitle">Join the UNISOLE community</p>

      <!-- Email Registration Form -->
      <form id="registerForm">
        <input type="text" name="name" id="name" placeholder="Enter your full name" required>
        <input type="email" name="email" id="email" placeholder="Enter a valid email" required>
        <input type="password" name="password" id="password" placeholder="Enter your password" required>
        <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm your password" required>
        <button type="submit">Register</button>
      </form>

      <p style="text-align:center; margin: 10px 0;">or</p>

      <!-- Google Sign-In Button -->
      <div id="googleSignInButton"></div>

      <div class="auth-switch">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="js/register.js"></script>
  <script src="js/enhancements.js" defer></script>

</body>
</html>
