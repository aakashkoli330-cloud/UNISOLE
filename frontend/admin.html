<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin – UNISOLE</title>

  <link rel="stylesheet" href="css/admin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="admin-navbar">
    <div class="logo">UNISOLE <span>Admin</span></div>

    <div class="nav-actions">
      <button id="themeToggle">🌙</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- PAGE TITLE -->
  <h1>Admin Panel</h1>

  <!-- TABS -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="products-section">
      Products
    </button>
    <button class="tab-btn" data-tab="orders-section">
      Orders
    </button>
  </div>

  <!-- ================= PRODUCTS SECTION ================= -->
  <section id="products-section" class="tab-content active">

    <h2>Add Product</h2>

    <!-- Wrap inputs in a proper form -->
    <form id="productForm" autocomplete="off">
      <input id="name" name="name" placeholder="Name" required>
      <input id="price" name="price" type="number" placeholder="Price" required>
      <input id="image" name="image" type="file" accept="image/*">
      <select id="category" name="category" required>
        <option value="">Select Category</option>
        <option value="men">Men</option>
        <option value="women">Women</option>
      </select>
      <textarea id="description" name="description" placeholder="Description"></textarea>

      <button type="submit" id="addBtn">Add Product</button>
    </form>

    <hr>

    <h2>All Products</h2>
    <div id="products"></div>

  </section>

  <!-- ================= ORDERS SECTION ================= -->
  <section id="orders-section" class="tab-content">

    <h2>All Orders</h2>
    <div id="admin-orders"></div>
  </section>

  <!-- ADMIN JS -->
  <script src="js/admin.js"></script>
  <script>
    // Prevent default form submission
    document.getElementById('productForm').addEventListener('submit', function(e){
      e.preventDefault();
      addProduct();
    });
  </script>

</body>
</html>
