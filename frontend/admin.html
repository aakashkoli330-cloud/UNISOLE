<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin – UNISOLE</title>

  <link rel="stylesheet" href="css/admin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="admin-navbar">
    <div class="logo">UNISOLE <span>Admin</span></div>

    <div class="nav-actions">
      <button id="themeToggle">🌙</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- PAGE TITLE -->
  <h1>Admin Panel</h1>

  <!-- TABS -->
  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="products-section">
      Products
    </button>
    <button class="tab-btn" data-tab="orders-section">
      Orders
    </button>
  </div>

  <!-- ================= PRODUCTS SECTION ================= -->
  <section id="products-section" class="tab-content active">

    <h2>Add Product</h2>

    <!-- 🔹 Added name and autocomplete attributes -->
    <input id="name" name="name" placeholder="Name" autocomplete="name">

    <input id="price" name="price" type="number" placeholder="Price" autocomplete="off">

    <input id="image" name="image" type="file" accept="image/*" autocomplete="off">

    <select id="category" name="category" autocomplete="off">
      <option value="">Select Category</option>
      <option value="men">Men</option>
      <option value="women">Women</option>
    </select>

    <textarea id="description" name="description" placeholder="Description" autocomplete="off"></textarea>

    <button id="addBtn">
      Add Product
    </button>

    <hr>

    <h2>All Products</h2>
    <div id="products"></div>

  </section>

  <!-- ================= ORDERS SECTION ================= -->
  <section id="orders-section" class="tab-content">

    <h2>All Orders</h2>

    <div id="admin-orders">
      <!-- Orders rendered by admin.js -->
    </div>

  </section>

  <!-- ADMIN JS -->
  <script src="js/admin.js"></script>

</body>
</html>
