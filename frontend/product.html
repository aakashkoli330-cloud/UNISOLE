<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product | UNISOLE</title>

    <!-- BASE STYLES -->
    <link rel="stylesheet" href="css/stock-patch.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/bottom-nav.css" />
    <link rel="stylesheet" href="css/touch.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/product.css" />

    <!-- FONTS & ICONS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <!-- ================= NAVBAR ================= -->
    <header class="navbar">
      <div class="nav-container">
        <div class="nav-left">
          <a href="index.html" class="brand">UNISOLE</a>
        </div>

        <nav class="nav-links nav-center">
          <a href="mens.html">Men</a>
          <a href="womens.html">Women</a>
          <a href="orders.html">Orders</a>
        </nav>

        <div class="nav-right">
          <div class="nav-actions">
            <a href="cart.html" class="cart-btn" aria-label="Cart">
              <i class="fa-solid fa-bag-shopping"></i>
              <span id="cart-count" class="cart-count">0</span>
            </a>

            <a href="login.html" class="login-btn">Login</a>

            <a
              href="profile.html"
              id="profile-btn"
              class="profile-icon"
              style="display: none"
              aria-label="Profile"
            >
              <i class="fa-solid fa-user"></i>
            </a>
          </div>
        </div>

        <div class="hamburger"><span></span><span></span><span></span></div>
      </div>
    </header>

    <!-- ================= PRODUCT PAGE ================= -->
    <main class="product-page">
      <!-- IMAGE -->
      <div class="product-image reveal-left">
        <img src="" alt="Product image" />
      </div>

      <!-- DETAILS -->
      <div class="product-details reveal-right">
        <div class="product-category reveal"></div>

        <h1 class="product-title reveal"></h1>

        <div class="product-price reveal"></div>

        <p class="product-stock reveal"></p>

        <p class="product-desc reveal"></p>

        <div class="action-buttons reveal">
          <button class="add-cart-btn btn-animate btn-magnetic ripple">
            Add to Cart
          </button>
        </div>

        <div class="extra-info reveal-stagger">
          <p><i class="fa-solid fa-truck"></i> Free Delivery</p>
          <p><i class="fa-solid fa-rotate-left"></i> 7-Day Easy Returns</p>
          <p>
            <i class="fa-solid fa-shield-halved"></i> 100% Original Products
          </p>
        </div>
      </div>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
      <div class="footer-brand">UNISOLE</div>
      <p class="footer-tagline">Designed for Motion</p>

      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="mens.html">Men</a>
        <a href="womens.html">Women</a>
        <a href="orders.html">Orders</a>
        <a href="cart.html">Cart</a>
      </div>

      <div class="footer-social">
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
      </div>

      <div class="footer-divider"></div>

      <p>© 2026 UNISOLE — Designed for Motion</p>
      <p>
        Contact us -
        <a href="mailto:unisole.store@gmail.com">unisole.store@gmail.com</a>
      </p>
    </footer>

    <!-- ================= BOTTOM NAVIGATION (Mobile) ================= -->
    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="index.html" class="bottom-nav-item" data-page="home">
          <i class="fas fa-home"></i>
          <span>Home</span>
        </a>
        <a href="mens.html" class="bottom-nav-item" data-page="men">
          <i class="fas fa-person"></i>
          <span>Men</span>
        </a>
        <a href="womens.html" class="bottom-nav-item" data-page="women">
          <i class="fas fa-person-dress"></i>
          <span>Women</span>
        </a>
        <a href="cart.html" class="bottom-nav-item" data-page="cart">
          <i class="fas fa-bag-shopping"></i>
          <span>Cart</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" data-page="profile">
          <i class="fas fa-user"></i>
          <span>Profile</span>
        </a>
      </div>
    </nav>

    <!-- ================= SCRIPTS ================= -->
    <script src="js/toast.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script src="js/authNavbar.js"></script>
    <script src="js/headerAuth.js"></script>

    <script src="js/cartActions.js"></script>
    <script src="js/product.js"></script>
    <script src="js/enhancements.js" defer></script>
    <script src="js/animations.js" defer></script>
  </body>
</html>
